<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的漂亮個人網頁</title>
    <style>
        /* 這裡就是 CSS 魔法，讓網頁變好看的地方 */
       body {
    /* 把括號裡的網址換成你喜歡的圖片網址 */
    background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
    
    /* 讓圖片舖滿整個螢幕，不會重疊亂跳 */
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: "Microsoft JhengHei", sans-serif;
}
        }
.card {
    background: rgba(255, 255, 255, 1); /* 最後一個數字 0.8 是透明度，越小越透明 */
    backdrop-filter: blur(10px); /* 讓背景有一點點模糊，很有質感 */
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    text-align: center;
    max-width: 300px;
}
        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; line-height: 1.6; }
        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #4facfe;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: 0.3s;
        }
        .button:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello!</h1>
        <p>我是 <strong>xufumi</strong><br>這是我的第一個漂亮網頁！</p>
        <a href="#" class="button">按我沒反應喔！</a>
    </div>
</body>
</html>
