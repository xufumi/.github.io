<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xufumi | 空間</title>
    <style>
        /* 池核風格：清涼、安靜、淺藍 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* 這裡換成了一張靜謐的池水圖 */
            background: linear-gradient(rgba(173, 216, 230, 0.4), rgba(173, 216, 230, 0.4)), 
                        url('https://images.unsplash.com/photo-1565039320828-e97535b882e0?q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            color: #2c3e50;
        }
        /* 沙漏本體設計 */
.hourglass {
    display: block;
    background: none;
    margin: 0 auto 20px auto;
    border: none;
    width: 2em;
    height: 4em;
    position: relative;
    /* 這裡設定 60s 代表一分鐘翻轉一次 */
    animation: flip 60s infinite linear;
}

/* 畫出沙漏的形狀 */
.hourglass:after, .hourglass:before {
    content: "";
    box-sizing: border-box;
    display: block;
    border-left: 1em solid transparent;
    border-right: 1em solid transparent;
    width: 0;
    height: 0;
    position: absolute;
}

/* 上半部沙漏 */
.hourglass:before {
    border-top: 2em solid #abd8e6; /* 使用你的池水淺藍色 */
    top: 0;
}

/* 下半部沙漏 */
.hourglass:after {
    border-bottom: 2em solid #abd8e6;
    bottom: 0;
}

/* 翻轉動畫：每分鐘轉 180 度 */
@keyframes flip {
    0% { transform: rotate(0); }
    95% { transform: rotate(0); } /* 前 57 秒都不動 */
    100% { transform: rotate(180deg); } /* 最後 3 秒快速翻轉 */
}
        /* 仿 Carrd 的簡約高雅卡片 */
        .container {
            background: rgba(255, 255, 255, 0.6); /* 半透明白 */
            backdrop-filter: blur(15px); /* 毛玻璃特效 */
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: 2px; /* 方正一點更有高雅感 */
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 80%;
            border: 1px solid rgba(255,255,255,0.3);
            letter-spacing: 2px; /* 字距拉開更有氣質 */
        }

        h1 {
            font-weight: 300;
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #5d6d7e;
        }

        .line {
            width: 30px;
            height: 1px;
            background: #5d6d7e;
            margin: 20px auto;
        }

        p {
            font-size: 0.9rem;
            line-height: 2;
            color: #7f8c8d;
        }

        /* 按鈕風格 */
        .links {
            margin-top: 25px;
        }

        .link-btn {
            display: block;
            text-decoration: none;
            color: #5d6d7e;
            font-size: 0.8rem;
            padding: 10px;
            border: 1px solid #d6eaf8;
            margin-bottom: 10px;
            transition: 0.4s;
            background: rgba(255,255,255,0.4);
        }

        .link-btn:hover {
            background: #d6eaf8;
            letter-spacing: 4px; /* 移上去字會拉開 */
        }
    </style>
</head>
<body>

    <div class="hourglass"></div>
        <h1>xufumi</h1>
        <div class="line"></div>
        <p>
            這是我的祕密空間<br>
            靜謐、純淨、微涼<br>
            如同沉入池底的呼吸
        </p>
        
        <div class="links">
            <a href="#" class="link-btn">關於我</a>
            <a href="#" class="link-btn">作品集</a>
            <a href="https://fumi1127.carrd.co/" class="link-btn">我的 Carrd</a>
        </div>
    </div>

</body>
</html>
